name: merge-coordinator
description: Auto-squash-merge for agent PRs only. Single-shot predicate. No retreats. Notify Shelly on any non-mergeable signal so a human can take over.
max_revisions: 1
on_exhaustion: block

steps:
  - agent: merge-coordinator
    on:
      done:    { terminal: true }
      blocked: { terminal: true }
      failed:  { terminal: true }
