name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-core:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          # dist/ is required because docker-compose mounts ./dist:/app/dist;
          # without uploading the freshly-built bundle the container serves
          # the stale dashboard from whatever shipped on the VPS last time.
          source: "infra/*,docker-compose.yml,Makefile,dist/dashboard/**"
          target: ~/dev-panel/
          strip_components: 0
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: >-
            ADMIN_API_KEY,GITHUB_TOKEN_DEPLOY,VOYAGE_API_KEY,
            AFFINE_DB_PASSWORD,PLANE_DB_PASSWORD,PLANE_SECRET_KEY,
            PLANE_MINIO_ROOT_USER,PLANE_MINIO_ROOT_PASSWORD,
            PENPOT_SECRET_KEY,PENPOT_DB_PASSWORD,
            TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,AUTHORIZED_TELEGRAM_USER_ID,TRAEFIK_USER,TRAEFIK_PASS
          script: |
            cd ~/dev-panel

            # Export secrets for init.sh
            export ADMIN_API_KEY="$ADMIN_API_KEY"
            export GITHUB_TOKEN="$GITHUB_TOKEN_DEPLOY"
            export VOYAGE_API_KEY="$VOYAGE_API_KEY"
            export AFFINE_DB_PASSWORD="$AFFINE_DB_PASSWORD"
            export PLANE_DB_PASSWORD="$PLANE_DB_PASSWORD"
            export PLANE_SECRET_KEY="$PLANE_SECRET_KEY"
            export PLANE_MINIO_ROOT_USER="$PLANE_MINIO_ROOT_USER"
            export PLANE_MINIO_ROOT_PASSWORD="$PLANE_MINIO_ROOT_PASSWORD"
            export PENPOT_SECRET_KEY="$PENPOT_SECRET_KEY"
            export PENPOT_DB_PASSWORD="$PENPOT_DB_PASSWORD"
            export TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN"
            export TELEGRAM_CHAT_ID="$TELEGRAM_CHAT_ID"
            export AUTHORIZED_TELEGRAM_USER_ID="${AUTHORIZED_TELEGRAM_USER_ID:-$TELEGRAM_CHAT_ID}"
            export TRAEFIK_USER="$TRAEFIK_USER"
            export TRAEFIK_PASS="$TRAEFIK_PASS"
            # Private LAN IP for redis/postgres port binding (see docker-compose.yml)
            export LAN_HOST="10.0.0.2"

            # Initialize .env.production (idempotent — preserves existing secrets)
            bash infra/init.sh production

            # ──────────────────────────────────────────────────────────────
            # DEPLOY RULE (see memory/infra_deploy_isolation.md):
            # Per-push CI only refreshes the `devpanel` container.
            # Plane, Penpot, Affine, traefik, redis, postgres, monitoring
            # are persistent team infrastructure — they stay up across
            # deploys. Touching them here has caused repeated Plane outages.
            # Bootstrap / stack rebuild is a manual op, not a CI job.
            # ──────────────────────────────────────────────────────────────
            docker compose pull devpanel
            docker compose up -d --no-deps devpanel

            # Health check
            sleep 15
            docker compose ps devpanel
            docker exec devpanel-api curl -sf http://localhost:3030/api/health || echo "⚠️ DevPanel health check failed"

            # Cleanup dangling images only (do not prune the stopped plane-migrator etc.)
            docker image prune -f
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          GITHUB_TOKEN_DEPLOY: ${{ secrets.GH_DEPLOY_TOKEN }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          AFFINE_DB_PASSWORD: ${{ secrets.AFFINE_DB_PASSWORD }}
          PLANE_DB_PASSWORD: ${{ secrets.PLANE_DB_PASSWORD }}
          PLANE_SECRET_KEY: ${{ secrets.PLANE_SECRET_KEY }}
          PLANE_MINIO_ROOT_USER: ${{ secrets.PLANE_MINIO_ROOT_USER }}
          PLANE_MINIO_ROOT_PASSWORD: ${{ secrets.PLANE_MINIO_ROOT_PASSWORD }}
          PENPOT_SECRET_KEY: ${{ secrets.PENPOT_SECRET_KEY }}
          PENPOT_DB_PASSWORD: ${{ secrets.PENPOT_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AUTHORIZED_TELEGRAM_USER_ID: ${{ secrets.AUTHORIZED_TELEGRAM_USER_ID }}
          TRAEFIK_USER: ${{ secrets.TRAEFIK_USER }}
          TRAEFIK_PASS: ${{ secrets.TRAEFIK_PASS }}

  # deploy-agents intentionally omitted from CI — the agents-node firewall
  # does not whitelist GitHub Actions runner IPs. Run scripts/deploy-agents.sh
  # locally from a machine that has the hetzner-vps SSH key. Mirrors the
  # equivalent CI step.

  sync-devpanel-stories:
    needs: deploy-core
    uses: ./.github/workflows/sync-stories.yml
    with:
      project-slug: devpanel
      stories-path: stories
      source-path: src/dashboard
    secrets:
      SYNC_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      SYNC_HOST: ${{ secrets.VPS_HOST }}

  sync-shared-stories:
    needs: deploy-core
    uses: ./.github/workflows/sync-stories.yml
    with:
      project-slug: shared
      stories-path: stories-shared
    secrets:
      SYNC_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      SYNC_HOST: ${{ secrets.VPS_HOST }}
