name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-core:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infra/*,docker-compose.yml,Makefile"
          target: ~/dev-panel/
          strip_components: 0
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: >-
            ADMIN_API_KEY,GITHUB_TOKEN_DEPLOY,VOYAGE_API_KEY,
            AFFINE_DB_PASSWORD,PLANE_DB_PASSWORD,PLANE_SECRET_KEY,
            PLANE_MINIO_ROOT_USER,PLANE_MINIO_ROOT_PASSWORD,
            PENPOT_SECRET_KEY,PENPOT_DB_PASSWORD,
            TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,TRAEFIK_USER,TRAEFIK_PASS
          script: |
            cd ~/dev-panel

            # Export secrets for init.sh
            export ADMIN_API_KEY="$ADMIN_API_KEY"
            export GITHUB_TOKEN="$GITHUB_TOKEN_DEPLOY"
            export VOYAGE_API_KEY="$VOYAGE_API_KEY"
            export AFFINE_DB_PASSWORD="$AFFINE_DB_PASSWORD"
            export PLANE_DB_PASSWORD="$PLANE_DB_PASSWORD"
            export PLANE_SECRET_KEY="$PLANE_SECRET_KEY"
            export PLANE_MINIO_ROOT_USER="$PLANE_MINIO_ROOT_USER"
            export PLANE_MINIO_ROOT_PASSWORD="$PLANE_MINIO_ROOT_PASSWORD"
            export PENPOT_SECRET_KEY="$PENPOT_SECRET_KEY"
            export PENPOT_DB_PASSWORD="$PENPOT_DB_PASSWORD"
            export TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN"
            export TELEGRAM_CHAT_ID="$TELEGRAM_CHAT_ID"
            export TRAEFIK_USER="$TRAEFIK_USER"
            export TRAEFIK_PASS="$TRAEFIK_PASS"
            # Private LAN IP for redis/postgres port binding (see docker-compose.yml)
            export LAN_HOST="10.0.0.2"

            # Initialize .env.production
            bash infra/init.sh production

            # Deploy core stack
            docker compose pull
            docker compose --profile core up -d
            docker compose --profile plane up -d
            docker compose --profile penpot up -d
            docker compose --profile monitoring up -d

            # Health check (worker runs on agents node; see scripts/deploy-agent-worker.sh)
            sleep 15
            docker compose ps
            docker exec devpanel-api curl -sf http://localhost:3030/api/health || echo "⚠️ DevPanel health check failed"

            # Cleanup
            docker image prune -f
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          GITHUB_TOKEN_DEPLOY: ${{ secrets.GH_DEPLOY_TOKEN }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          AFFINE_DB_PASSWORD: ${{ secrets.AFFINE_DB_PASSWORD }}
          PLANE_DB_PASSWORD: ${{ secrets.PLANE_DB_PASSWORD }}
          PLANE_SECRET_KEY: ${{ secrets.PLANE_SECRET_KEY }}
          PLANE_MINIO_ROOT_USER: ${{ secrets.PLANE_MINIO_ROOT_USER }}
          PLANE_MINIO_ROOT_PASSWORD: ${{ secrets.PLANE_MINIO_ROOT_PASSWORD }}
          PENPOT_SECRET_KEY: ${{ secrets.PENPOT_SECRET_KEY }}
          PENPOT_DB_PASSWORD: ${{ secrets.PENPOT_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRAEFIK_USER: ${{ secrets.TRAEFIK_USER }}
          TRAEFIK_PASS: ${{ secrets.TRAEFIK_PASS }}

  deploy-agents:
    needs: deploy-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_AGENTS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: >-
            ADMIN_API_KEY,VOYAGE_API_KEY,AFFINE_DB_PASSWORD,
            TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            set -e

            # Pull latest code and install deps as deploy user
            su - deploy -c 'cd /home/deploy/projects/dev-panel && git pull --ff-only'
            su - deploy -c 'cd /home/deploy/projects/dev-panel && npm install --production --silent'

            # Regenerate .env.agent from CI secrets (chmod 600, deploy-owned)
            cat > /home/deploy/projects/dev-panel/.env.agent <<ENVEOF
            PG_PASSWORD=$AFFINE_DB_PASSWORD
            VOYAGE_API_KEY=$VOYAGE_API_KEY
            ADMIN_API_KEY=$ADMIN_API_KEY
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID
            ENVEOF
            chown deploy:deploy /home/deploy/projects/dev-panel/.env.agent
            chmod 600 /home/deploy/projects/dev-panel/.env.agent

            # Refresh systemd unit and restart worker
            cp /home/deploy/projects/dev-panel/infra/devpanel-worker.service \
               /etc/systemd/system/devpanel-worker.service
            systemctl daemon-reload
            systemctl enable devpanel-worker
            systemctl restart devpanel-worker

            # Health check
            sleep 3
            systemctl is-active devpanel-worker && \
              journalctl -u devpanel-worker --no-pager -n 5 -o cat | tail -5 || \
              { echo "worker failed to start"; journalctl -u devpanel-worker --no-pager -n 20 -o cat | tail -20; exit 1; }
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          AFFINE_DB_PASSWORD: ${{ secrets.AFFINE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
