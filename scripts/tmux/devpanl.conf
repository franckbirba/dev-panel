# scripts/tmux/devpanl.conf — config for the local devpanl cockpit.
# Loaded explicitly by scripts/tmux-cockpit.sh via `tmux -f`. Does NOT
# extend ~/.tmux.conf — `-f` replaces. Keep this file minimal.

set -g default-terminal "screen-256color"

# Windows and panes start at 1, not 0 — easier to reach on a keyboard.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g history-limit 50000

# Status bar — subtle, informative. No theme deps.
set -g status-style bg=default,fg=cyan
set -g status-left "[#S] "
set -g status-right "%H:%M  #h"
set -g status-interval 5

# Prefix stays Ctrl-b — don't surprise muscle memory.

# `prefix r` sends Enter to the active pane and redraws the client. Use it
# when a pane looks blank on first switch — tmux only paints a pane when a
# client first selects it, and SSH/login output may not have arrived yet,
# so you can land on an empty buffer until you press something.
bind-key r send-keys Enter \; refresh-client \; display-message "pane refreshed"

# `prefix y` opens yazi (TUI file explorer) in a new horizontal pane below
# the current one, starting in the active pane's working directory. Quit
# yazi with `q` and the pane closes. Requires `brew install yazi`.
bind-key y split-window -v -c "#{pane_current_path}" "yazi"
