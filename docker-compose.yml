# ============================================================================
# dev-panel — Unified docker-compose with profiles
# Profiles:
#   core       → traefik, redis, devpanel, postgres, affine
#   plane      → plane stack (web, api, db, minio)
#   penpot     → penpot stack (frontend, backend, db)
#   monitoring → uptime-kuma, bull-board
#   all        → everything
# ============================================================================
services:
  # ══════════════════════════════════════════════════════════════════════════
  # CORE STACK
  # ══════════════════════════════════════════════════════════════════════════

  traefik:
    image: traefik:v2.11
    container_name: traefik
    profiles: [core, all]
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--log.level=WARN"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - ./infra/config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/config/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./infra/config/.htpasswd:/etc/traefik/.htpasswd:ro
    networks:
      - devpanel_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.devpanl.dev`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=oauth-google@docker"

  # ──────────────────────────────────────────────────────────────────────
  # traefik-forward-auth — Google SSO gate for internal admin UIs
  # Fronts: traefik dashboard, bull-board, storybook (ui.devpanl.dev).
  # AFFiNE uses its own app login and is NOT behind this proxy.
  # Chosen over oauth2-proxy because Traefik's errors middleware preserves
  # the 401 status, breaking oauth2-proxy's redirect flow. thomseddon's
  # traefik-forward-auth is built to emit a real 307 on the ForwardAuth
  # response, which browsers follow natively.
  # ──────────────────────────────────────────────────────────────────────
  oauth2-proxy:
    image: thomseddon/traefik-forward-auth:2
    container_name: devpanel-oauth2-proxy
    profiles: [core, all]
    restart: unless-stopped
    environment:
      PROVIDERS_GOOGLE_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      PROVIDERS_GOOGLE_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      AUTH_HOST: auth.devpanl.dev
      COOKIE_DOMAIN: devpanl.dev
      LIFETIME: "604800"  # 7 days
      LOG_LEVEL: info
    # WHITELIST is rendered from infra/config/oauth2-proxy-emails.txt by
    # infra/scripts/render-whitelist.sh during deploy. The file is gitignored
    # and regenerated per deploy so the .txt file stays the source of truth.
    env_file:
      - path: .env.oauth2-proxy
        required: true
    networks:
      - devpanel_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oauth2proxy.rule=Host(`auth.devpanl.dev`)"
      - "traefik.http.routers.oauth2proxy.entrypoints=websecure"
      - "traefik.http.routers.oauth2proxy.tls=true"
      - "traefik.http.routers.oauth2proxy.tls.certresolver=letsencrypt"
      # CRITICAL: auth host itself must use the forwardauth middleware so that
      # Traefik passes X-Forwarded-Uri to forward-auth. Otherwise forward-auth
      # reads an empty URI and routes /_oauth?code=... to AuthHandler instead
      # of AuthCallback, causing an infinite redirect loop to Google.
      - "traefik.http.routers.oauth2proxy.middlewares=oauth-google@docker"
      - "traefik.http.services.oauth2proxy.loadbalancer.server.port=4181"
      # ForwardAuth middleware: returns 307 to Google when unauthenticated
      - "traefik.http.middlewares.oauth-google.forwardauth.address=http://oauth2-proxy:4181"
      - "traefik.http.middlewares.oauth-google.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.oauth-google.forwardauth.authResponseHeaders=X-Forwarded-User"

  redis:
    image: redis:7-alpine
    container_name: devpanel-redis
    profiles: [core, all]
    restart: unless-stopped
    ports:
      # Expose on private LAN only (10.0.0.2) for the agents-node worker.
      - "${LAN_HOST:-127.0.0.1}:6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    networks:
      - devpanel_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  devpanel:
    image: ghcr.io/franckbirba/dev-panel:latest
    container_name: devpanel-api
    profiles: [core, all]
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      ALLOWED_ORIGINS: https://devpanl.dev,https://edms.epitools.bj,https://candidat.epitools.bj,https://zeno.epitools.bj,http://localhost:3000,http://localhost:3030
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      # External MCP servers the dashboard chat connects to so Qwen sees
      # the same surface as Shelly (AFFiNE × 3 workspaces + GitHub).
      # AFFINE_API_TOKEN is the same token used by Shelly's ~/.mcp.json on
      # the agents host. If unset, the AFFiNE connectors silently disable.
      AFFINE_API_TOKEN: ${AFFINE_API_TOKEN:-}
      AFFINE_BASE_URL: ${AFFINE_BASE_URL:-https://affine.devpanl.dev}
      ENABLE_MONITORING: "true"
      ENABLE_BULLMQ: "true"
      ENABLE_MCP_HTTP: "true"
      # Chat backend MCP — connect to ourselves directly (localhost) rather
      # than going through Traefik/Cloudflare. The @ai-sdk/mcp client's
      # Streamable HTTP transport breaks when routed through the external
      # proxy chain (HTTP 400 "Server not initialized").
      DEVPANEL_MCP_URL: http://localhost:3030/mcp
      # Chat backend (apps/chat → /api/chat). Defaults to Qwen3-Coder via
      # DeepInfra (cheap-tier). User can flip in the chat header dropdown
      # (DEVPA-206 frontend wiring).
      LLM_PROVIDER: ${LLM_PROVIDER:-deepinfra}
      LLM_MODEL: ${LLM_MODEL:-Qwen/Qwen3-Coder-480B-A35B-Instruct-Turbo}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Trust X-Forwarded-User from Traefik (set by traefik-forward-auth
      # after Google SSO). Used by /api/projects authenticateSpaBootstrap.
      # Safe because the container only listens on the docker network and
      # Traefik strips inbound X-Forwarded-User from clients before injecting.
      TRUST_FORWARDED_USER: "true"
      # PG_*, VOYAGE_*, AGENT_MEMORY_NAMESPACE all come from env_file (.env.production)
      # — init.sh generates them in sync with AFFINE_DB_PASSWORD.
      # Orchestration state (workflow_instances, agent_job_*) lives in the shared
      # pg (agent_memory db) via migration 003 — see src/server/workflow-instances.js.
    volumes:
      - ./storage:/app/storage
      - ./dist:/app/dist
    ports:
      # Expose on private LAN only (10.0.0.2) so Shelly's MCP and the worker
      # on the agents node (10.0.0.3) can reach /api/* without going through
      # Traefik's oauth2-proxy (which would 307 → Google SSO and break MCP
      # calls). Same pattern as redis (line 107) and postgres (line 220).
      # LAN_HOST defaults to 127.0.0.1 so dev machines don't accidentally
      # expose the API.
      - "${LAN_HOST:-127.0.0.1}:3030:3030"
    networks:
      - devpanel_net
    depends_on:
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    labels:
      - "traefik.enable=true"
      # Single backend service shared by all routers below.
      - "traefik.http.services.devpanel.loadbalancer.server.port=3030"
      # ── SPA-bootstrap router: browser endpoints that need X-Forwarded-User.
      # Highest priority. Goes through oauth-google so traefik-forward-auth
      # injects X-Forwarded-User; the Express middleware then trusts it
      # (TRUST_FORWARDED_USER=true). Covers SPA-bootstrap (/api/projects,
      # /api/dashboard), live engine views (/api/fleet, /api/health/queues),
      # dashboard pulse (/api/today, /api/metrics), and the two
      # browser-exclusive admin tools (/api/admin/local-log, /api/admin/shell).
      # Most /api/admin/* paths stay on the M2M router below because they
      # are dual-use (browser + agents-host worker via X-Admin-Key); putting
      # them behind SSO would break the worker's lookupProjectByPlaneId path.
      # Widget paths (/api/captures, /api/threads, /api/widget/*, /api/team/*,
      # /api/tickets) also stay on M2M — they auth via X-API-Key.
      - "traefik.http.routers.devpanel-api-spa.rule=Host(`devpanl.dev`) && (Path(`/api/projects`) || PathPrefix(`/api/projects/summary`) || PathPrefix(`/api/dashboard`) || PathPrefix(`/api/fleet`) || PathPrefix(`/api/health/queues`) || Path(`/api/today`) || Path(`/api/metrics`) || Path(`/api/admin/local-log`) || Path(`/api/admin/shell`))"
      - "traefik.http.routers.devpanel-api-spa.entrypoints=websecure"
      - "traefik.http.routers.devpanel-api-spa.tls=true"
      - "traefik.http.routers.devpanel-api-spa.tls.certresolver=letsencrypt"
      - "traefik.http.routers.devpanel-api-spa.service=devpanel"
      - "traefik.http.routers.devpanel-api-spa.middlewares=oauth-google@docker"
      - "traefik.http.routers.devpanel-api-spa.priority=300"
      # ── M2M router: /api/*, /widget.js, /health — NO oauth.
      # Used by the standalone widget (cross-origin <script>), the
      # agents-node worker (X-API-Key / X-Admin-Key), and uptime-kuma probes.
      - "traefik.http.routers.devpanel-api.rule=Host(`devpanl.dev`) && (PathPrefix(`/api`) || Path(`/widget.js`) || PathPrefix(`/health`))"
      - "traefik.http.routers.devpanel-api.entrypoints=websecure"
      - "traefik.http.routers.devpanel-api.tls=true"
      - "traefik.http.routers.devpanel-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.devpanel-api.service=devpanel"
      - "traefik.http.routers.devpanel-api.priority=200"
      # ── Agent socket.io hub: /agents/socket.io — worker WebSocket only.
      # Bearer-token auth (AGENT_HUB_TOKEN) — never exposed to browsers.
      # Separate router so we can pin priority above the SPA's catch-all
      # without sending a Google-OAuth challenge to a non-browser client.
      - "traefik.http.routers.devpanel-agents.rule=Host(`devpanl.dev`) && PathPrefix(`/agents`)"
      - "traefik.http.routers.devpanel-agents.entrypoints=websecure"
      - "traefik.http.routers.devpanel-agents.tls=true"
      - "traefik.http.routers.devpanel-agents.tls.certresolver=letsencrypt"
      - "traefik.http.routers.devpanel-agents.service=devpanel"
      - "traefik.http.routers.devpanel-agents.priority=250"
      # ── Remote MCP transport: /mcp — Bearer ADMIN_API_KEY auth, no SSO.
      # Same reasoning as devpanel-agents above: Bearer clients (Claude
      # Code / Claude Desktop) can't satisfy Google OAuth, so we pin a
      # higher priority than the SPA catch-all and skip the oauth-google
      # middleware. Auth is enforced by src/server/mcp-http.js.
      - "traefik.http.routers.devpanel-mcp.rule=Host(`devpanl.dev`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.devpanel-mcp.entrypoints=websecure"
      - "traefik.http.routers.devpanel-mcp.tls=true"
      - "traefik.http.routers.devpanel-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.devpanel-mcp.service=devpanel"
      - "traefik.http.routers.devpanel-mcp.priority=250"
      # ── SPA router: everything else (/, /dashboard/*, static assets).
      # Gated by oauth-google@docker — Traefik bounces unauthenticated
      # browsers through auth.devpanl.dev → Google → back with cookie.
      - "traefik.http.routers.devpanel-spa.rule=Host(`devpanl.dev`)"
      - "traefik.http.routers.devpanel-spa.entrypoints=websecure"
      - "traefik.http.routers.devpanel-spa.tls=true"
      - "traefik.http.routers.devpanel-spa.tls.certresolver=letsencrypt"
      - "traefik.http.routers.devpanel-spa.service=devpanel"
      - "traefik.http.routers.devpanel-spa.middlewares=oauth-google@docker"
      - "traefik.http.routers.devpanel-spa.priority=100"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: devpanel-postgres
    profiles: [core, all]
    restart: unless-stopped
    environment:
      POSTGRES_USER: affine
      POSTGRES_PASSWORD: ${AFFINE_DB_PASSWORD}
      POSTGRES_DB: affine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      # Expose on private LAN only (10.0.0.2) so the worker on the agents
      # node (10.0.0.3) can reach it for memory_* MCP tools. Not public.
      - "${LAN_HOST:-127.0.0.1}:5432:5432"
    networks:
      - devpanel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affine"]
      interval: 10s
      timeout: 3s
      retries: 3

  affine-migration:
    image: ghcr.io/toeverything/affine:stable
    container_name: devpanel-affine-migration
    profiles: [core, all]
    volumes:
      - affine-config:/root/.affine/config
      - affine-storage:/root/.affine/storage
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    environment:
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgresql://affine:${AFFINE_DB_PASSWORD}@postgres:5432/affine
      AFFINE_INDEXER_ENABLED: "false"
    networks:
      - devpanel_net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────
  # MAILPIT — SMTP catcher for dev mail
  # SMTP on :1025 (internal only via devpanel_net), web UI on :8025.
  # Catches Affine workspace invites + magic links so we can onboard
  # users without configuring a real outbound SMTP relay. Also useful
  # for any future service that wants to email (GlitchTip alerts, etc.).
  # UI gated by oauth-google@docker — only WHITELIST emails see the inbox.
  # ──────────────────────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: devpanel-mailpit
    profiles: [core, all]
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_DATABASE: "/data/mailpit.db"
      # Do NOT advertise SMTP auth in EHLO — clients (nodemailer used by
      # Affine) refuse to send PLAIN auth with empty credentials. Without
      # auth advertised, they skip it entirely. Mailpit accepts unauthenticated
      # mail by default on a private network.
    volumes:
      - mailpit-data:/data
    networks:
      - devpanel_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailpit.rule=Host(`mail.devpanl.dev`)"
      - "traefik.http.routers.mailpit.entrypoints=websecure"
      - "traefik.http.routers.mailpit.tls=true"
      - "traefik.http.routers.mailpit.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mailpit.middlewares=oauth-google@docker"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"

  affine:
    image: ghcr.io/toeverything/affine:stable
    container_name: devpanel-affine
    profiles: [core, all]
    restart: unless-stopped
    environment:
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgresql://affine:${AFFINE_DB_PASSWORD}@postgres:5432/affine
      AFFINE_INDEXER_ENABLED: "false"
      AFFINE_SERVER_EXTERNAL_URL: "https://affine.devpanl.dev"
      # Outbound mail goes to Mailpit (internal SMTP catcher).
      # Affine sends invites + magic links here; a human catches them
      # at https://mail.devpanl.dev (gated by oauth-google).
      MAILER_HOST: mailpit
      MAILER_PORT: "1025"
      MAILER_SENDER: "noreply@devpanl.dev"
      MAILER_IGNORE_TLS: "true"
    volumes:
      - affine-config:/root/.affine/config
      - affine-storage:/root/.affine/storage
    networks:
      - devpanel_net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      affine-migration:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.affine.rule=Host(`affine.devpanl.dev`)"
      - "traefik.http.routers.affine.entrypoints=websecure"
      - "traefik.http.routers.affine.tls=true"
      - "traefik.http.routers.affine.tls.certresolver=letsencrypt"
      - "traefik.http.services.affine.loadbalancer.server.port=3010"

  # ══════════════════════════════════════════════════════════════════════════
  # PLANE STACK
  # ══════════════════════════════════════════════════════════════════════════

  plane-web:
    image: makeplane/plane-frontend:stable
    container_name: plane-web
    profiles: [plane, all]
    restart: unless-stopped
    depends_on: [plane-api]
    volumes:
      - ./infra/nginx/spa.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - devpanel_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.plane.rule=Host(`plane.devpanl.dev`)"
      - "traefik.http.routers.plane.entrypoints=websecure"
      - "traefik.http.routers.plane.tls=true"
      - "traefik.http.routers.plane.tls.certresolver=letsencrypt"
      - "traefik.http.services.plane.loadbalancer.server.port=3000"

  plane-api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    profiles: [plane, all]
    restart: unless-stopped
    command: ./bin/docker-entrypoint-api.sh
    environment:
      DATABASE_URL: postgresql://plane:${PLANE_DB_PASSWORD}@plane-db:5432/plane
      REDIS_URL: redis://plane-redis:6379
      # Plane uses Celery with kombu; without AMQP_URL, kombu defaults to
      # amqp://guest:guest@localhost:5672 (non-existent) and the
      # register_instance boot step loops forever. Point it at Redis.
      AMQP_URL: redis://plane-redis:6379/0
      CELERY_BROKER_URL: redis://plane-redis:6379/0
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: https://plane.devpanl.dev
      AWS_ACCESS_KEY_ID: ${PLANE_MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${PLANE_MINIO_ROOT_PASSWORD}
      AWS_S3_BUCKET_NAME: plane-uploads
      AWS_S3_ENDPOINT_URL: https://minio.devpanl.dev
      # Required by plane-backend's gunicorn entrypoint — otherwise
      # gunicorn -w '' fails with "invalid int value" and the container
      # restart-loops before serving. 4 workers is the minimum for the
      # browser bootstrap (15+ parallel API calls); 2 saturates and 504s.
      GUNICORN_WORKERS: "4"
      # Per-API-key throttle (plane.api.rate_limit.ApiKeyRateThrottle).
      # Upstream default is 60/minute, which throttles our 5-dev × N-agent
      # workload within seconds of a bootstrap. Bumped to keep the throttle
      # as a circuit-breaker against runaway loops only.
      API_KEY_RATE_LIMIT: "10000/minute"
    volumes:
      # Override DRF anon throttle rates — see header of infra/plane/common.py.
      # (Belt-and-braces with API_KEY_RATE_LIMIT above; covers paths that fall
      # through to AnonRateThrottle.)
      - ./infra/plane/common.py:/code/plane/settings/common.py:ro
    depends_on:
      plane-db:
        condition: service_healthy
      plane-migrator:
        condition: service_completed_successfully
    networks:
      - devpanel_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.plane-api.rule=Host(`plane.devpanl.dev`) && (PathPrefix(`/api`) || PathPrefix(`/auth`))"
      - "traefik.http.routers.plane-api.entrypoints=websecure"
      - "traefik.http.routers.plane-api.tls=true"
      - "traefik.http.routers.plane-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.plane-api.loadbalancer.server.port=8000"
      # Priority must beat plane-web's length-based default (~26 chars of
      # Host(plane.devpanl.dev) → Traefik multiplies rule length internally,
      # so explicit priority needs to be high). Otherwise every /api/*
      # request is served as the plane-web SPA. See memory:
      # infra_plane_caveats.md.
      - "traefik.http.routers.plane-api.priority=1000"

  plane-migrator:
    image: makeplane/plane-backend:stable
    container_name: plane-migrator
    profiles: [plane, all]
    restart: "no"
    command: ./bin/docker-entrypoint-migrator.sh
    environment:
      DATABASE_URL: postgresql://plane:${PLANE_DB_PASSWORD}@plane-db:5432/plane
      # Migrator also imports plane/celery.py which reads REDIS_URL at import;
      # without it the migrator errors out before running migrations.
      REDIS_URL: redis://plane-redis:6379
      AMQP_URL: redis://plane-redis:6379/0
      SECRET_KEY: ${PLANE_SECRET_KEY}
    depends_on:
      plane-db:
        condition: service_healthy
    networks:
      - devpanel_net

  plane-db:
    image: postgres:15.7-alpine
    container_name: plane-db
    profiles: [plane, all]
    restart: unless-stopped
    environment:
      POSTGRES_USER: plane
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
      POSTGRES_DB: plane
    volumes:
      - plane-pgdata:/var/lib/postgresql/data
    networks:
      - devpanel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plane"]
      interval: 10s
      timeout: 3s
      retries: 3

  plane-redis:
    image: redis:7-alpine
    container_name: plane-redis
    profiles: [plane, all]
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - plane-redisdata:/data
    networks:
      - devpanel_net

  plane-minio:
    image: minio/minio:latest
    container_name: plane-minio
    profiles: [plane, all]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PLANE_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${PLANE_MINIO_ROOT_PASSWORD}
    volumes:
      - plane-minio-data:/data
    networks:
      - devpanel_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.plane-minio.rule=Host(`minio.devpanl.dev`)"
      - "traefik.http.routers.plane-minio.entrypoints=websecure"
      - "traefik.http.routers.plane-minio.tls=true"
      - "traefik.http.routers.plane-minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.plane-minio.loadbalancer.server.port=9000"

  # ══════════════════════════════════════════════════════════════════════════
  # PENPOT STACK
  # ══════════════════════════════════════════════════════════════════════════

  penpot-frontend:
    image: penpotapp/frontend:2.4.2
    container_name: penpot-frontend
    profiles: [penpot, all]
    restart: unless-stopped
    depends_on:
      - penpot-backend
      - penpot-exporter
    volumes:
      - penpot-assets:/opt/data/assets
      - penpot-plugins:/var/www/app/plugins
    networks:
      - devpanel_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.penpot.rule=Host(`penpot.devpanl.dev`)"
      - "traefik.http.routers.penpot.entrypoints=websecure"
      - "traefik.http.routers.penpot.tls=true"
      - "traefik.http.routers.penpot.tls.certresolver=letsencrypt"
      - "traefik.http.services.penpot.loadbalancer.server.port=8080"

  penpot-backend:
    image: penpotapp/backend:2.4.2
    container_name: penpot-backend
    profiles: [penpot, all]
    restart: unless-stopped
    depends_on:
      penpot-postgres:
        condition: service_healthy
      penpot-redis:
        condition: service_healthy
    volumes:
      - penpot-assets:/opt/data/assets
    environment:
      PENPOT_FLAGS: enable-registration enable-login-with-password disable-email-verification enable-prepl-server disable-secure-session-cookies
      PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}
      PENPOT_PUBLIC_URI: https://penpot.devpanl.dev
      PENPOT_DATABASE_URI: postgresql://penpot-postgres/penpot
      PENPOT_DATABASE_USERNAME: penpot
      PENPOT_DATABASE_PASSWORD: ${PENPOT_DB_PASSWORD}
      PENPOT_REDIS_URI: redis://penpot-redis/0
      PENPOT_ASSETS_STORAGE_BACKEND: assets-fs
      PENPOT_STORAGE_ASSETS_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: "false"
    networks:
      - devpanel_net

  penpot-exporter:
    image: penpotapp/exporter:2.4.2
    container_name: penpot-exporter
    profiles: [penpot, all]
    restart: unless-stopped
    environment:
      PENPOT_PUBLIC_URI: http://penpot-frontend:8080
    networks:
      - devpanel_net

  penpot-redis:
    image: redis:7-alpine
    container_name: penpot-redis
    profiles: [penpot, all]
    restart: unless-stopped
    networks:
      - devpanel_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  penpot-postgres:
    image: postgres:15-alpine
    container_name: penpot-postgres
    profiles: [penpot, all]
    restart: unless-stopped
    environment:
      POSTGRES_USER: penpot
      POSTGRES_PASSWORD: ${PENPOT_DB_PASSWORD}
      POSTGRES_DB: penpot
    volumes:
      - penpot-pgdata:/var/lib/postgresql/data
    networks:
      - devpanel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Penpot MCP Server — bridge between Claude Code and Penpot plugin
  penpot-mcp:
    image: ghcr.io/franckbirba/penpot-mcp:latest
    container_name: penpot-mcp
    profiles: [penpot, all]
    restart: unless-stopped
    environment:
      PENPOT_BASE_URL: https://penpot.devpanl.dev
      PENPOT_MCP_SERVER_HOST: 0.0.0.0
      PENPOT_MCP_REMOTE_MODE: "true"
      PENPOT_MCP_WEBSOCKET_URL: wss://penpot-mcp.devpanl.dev
    networks:
      - devpanel_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.penpot-mcp.rule=Host(`penpot-mcp.devpanl.dev`)"
      - "traefik.http.routers.penpot-mcp.entrypoints=websecure"
      - "traefik.http.routers.penpot-mcp.tls=true"
      - "traefik.http.routers.penpot-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.penpot-mcp.service=penpot-mcp-http"
      - "traefik.http.services.penpot-mcp-http.loadbalancer.server.port=4401"
      # WebSocket for plugin communication
      - "traefik.http.routers.penpot-mcp-ws.rule=Host(`penpot-mcp.devpanl.dev`) && HeadersRegexp(`Connection`, `(?i)upgrade`)"
      - "traefik.http.routers.penpot-mcp-ws.entrypoints=websecure"
      - "traefik.http.routers.penpot-mcp-ws.tls=true"
      - "traefik.http.routers.penpot-mcp-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.penpot-mcp-ws.priority=100"
      - "traefik.http.routers.penpot-mcp-ws.service=penpot-mcp-ws"
      - "traefik.http.services.penpot-mcp-ws.loadbalancer.server.port=4402"

  # ══════════════════════════════════════════════════════════════════════════
  # MONITORING STACK
  # ══════════════════════════════════════════════════════════════════════════

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    profiles: [monitoring, all]
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - devpanel_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime.rule=Host(`status.devpanl.dev`)"
      - "traefik.http.routers.uptime.entrypoints=websecure"
      - "traefik.http.routers.uptime.tls=true"
      - "traefik.http.routers.uptime.tls.certresolver=letsencrypt"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"

  bull-board:
    image: deadly0/bull-board:latest
    container_name: devpanel-bull-board
    profiles: [monitoring, all]
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BULL_PREFIX: devpanel
    networks:
      - devpanel_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bullboard.rule=Host(`queues.devpanl.dev`)"
      - "traefik.http.routers.bullboard.entrypoints=websecure"
      - "traefik.http.routers.bullboard.tls=true"
      - "traefik.http.routers.bullboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.bullboard.loadbalancer.server.port=3000"
      - "traefik.http.routers.bullboard.middlewares=oauth-google@docker"

  # ──────────────────────────────────────────────────────────────────────
  # GlitchTip — Sentry-API-compatible error tracking, multi-project
  # Spec: DEVPA-168 / Plane page "Observability — error tracking (GlitchTip)"
  # Bridge: src/server/webhooks-glitchtip.js (DEVPA-169) receives webhooks
  # from this stack and lands errors in the captures inbox.
  #
  # ISOLATION: own postgres + own redis (do not reuse plane-db or devpanel-
  # redis). Profile glitchtip is opted-out of CI deploys per CLAUDE.md
  # "Deploy isolation rule" — bootstrap manually with:
  #   docker compose --profile glitchtip up -d
  # ──────────────────────────────────────────────────────────────────────
  glitchtip-db:
    image: postgres:15-alpine
    container_name: glitchtip-db
    profiles: [glitchtip, all]
    restart: unless-stopped
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD}
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip-pgdata:/var/lib/postgresql/data
    networks:
      - devpanel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip"]
      interval: 10s
      timeout: 3s
      retries: 3

  glitchtip-redis:
    image: redis:7-alpine
    container_name: glitchtip-redis
    profiles: [glitchtip, all]
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - devpanel_net

  glitchtip-migrate:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-migrate
    profiles: [glitchtip, all]
    restart: "no"
    command: ./bin/run-migrate.sh
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
    depends_on:
      glitchtip-db:
        condition: service_healthy
    networks:
      - devpanel_net

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-web
    profiles: [glitchtip, all]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      GLITCHTIP_DOMAIN: https://${GLITCHTIP_DOMAIN:-glitchtip.devpanl.dev}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-glitchtip@devpanl.dev}
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      ENABLE_USER_REGISTRATION: ${GLITCHTIP_ENABLE_USER_REGISTRATION:-False}
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-migrate:
        condition: service_completed_successfully
    networks:
      - devpanel_net
    labels:
      - "traefik.enable=true"

      # Single router on the GlitchTip domain. No oauth-google middleware
      # here — GlitchTip handles auth itself (Django login, invite-only
      # via ENABLE_USER_REGISTRATION=False), matching the Plane and Affine
      # convention on this stack. Wrapping it in oauth2-proxy would also
      # break SDK ingest pushes from cross-domain client apps that can't
      # share the SSO cookie.
      #
      # NB: Sentry's ingest paths (/api/<num>/store|envelope|security|
      # minidump) are public by design — auth lives in the DSN's public
      # key, validated by GlitchTip itself.
      - "traefik.http.routers.glitchtip.rule=Host(`${GLITCHTIP_DOMAIN:-glitchtip.devpanl.dev}`)"
      - "traefik.http.routers.glitchtip.entrypoints=websecure"
      - "traefik.http.routers.glitchtip.tls=true"
      - "traefik.http.routers.glitchtip.tls.certresolver=letsencrypt"
      - "traefik.http.services.glitchtip.loadbalancer.server.port=8000"

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-worker
    profiles: [glitchtip, all]
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-migrate:
        condition: service_completed_successfully
    networks:
      - devpanel_net

  # ──────────────────────────────────────────────────────────────────────
  # Storybook — shared UI catalogue for every studio project
  # Stories arrive via rsync from each project's repo on every push to main
  # ──────────────────────────────────────────────────────────────────────
  storybook:
    image: ghcr.io/franckbirba/devpanl-storybook:latest
    container_name: devpanel-storybook
    profiles: [core, all]
    restart: unless-stopped
    volumes:
      - ./storybook-stories:/stories:ro
    networks:
      - devpanel_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storybook.rule=Host(`ui.devpanl.dev`)"
      - "traefik.http.routers.storybook.entrypoints=websecure"
      - "traefik.http.routers.storybook.tls=true"
      - "traefik.http.routers.storybook.tls.certresolver=letsencrypt"
      - "traefik.http.services.storybook.loadbalancer.server.port=6006"
      - "traefik.http.routers.storybook.middlewares=oauth-google@docker"

# ══════════════════════════════════════════════════════════════════════════
# VOLUMES & NETWORKS
# ══════════════════════════════════════════════════════════════════════════

volumes:
  traefik-certs:
  redis-data:
  postgres-data:
  affine-config:
  affine-storage:
  mailpit-data:
  plane-pgdata:
  plane-redisdata:
  plane-minio-data:
  penpot-assets:
  penpot-plugins:
  penpot-pgdata:
  glitchtip-pgdata:
  uptime-kuma-data:

networks:
  devpanel_net:
    driver: bridge
