name: dev-panel-prod

services:
  devpanel:
    image: ghcr.io/franckbirba/dev-panel:latest
    container_name: devpanel-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./storage:/app/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devpanel.rule=Host(`devpanel.dev`)"
      - "traefik.http.routers.devpanel.entrypoints=web"
      - "traefik.http.routers.devpanel.middlewares=security-headers@file"
      - "traefik.http.services.devpanel.loadbalancer.server.port=3030"
    networks:
      - traefik

  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik
    networks:
      - traefik

networks:
  traefik:
    name: traefik
