services:
  # ============================================================================
  # TRAEFIK — Reverse proxy with Let's Encrypt
  # ============================================================================
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.45"
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./.htpasswd:/etc/traefik/.htpasswd:ro
    networks:
      - devpanel_net
    labels:
      # Dashboard auth (basic auth)
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.devpanl.dev`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_AUTH}"

  # ============================================================================
  # REDIS — BullMQ backend (shared with monitoring stack)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: devpanel-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    networks:
      - devpanel_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ============================================================================
  # DEVPANEL API — Main application
  # ============================================================================
  devpanel:
    build:
      context: /home/deploy/dev-panel
      dockerfile: Dockerfile
    container_name: devpanel-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      ALLOWED_ORIGINS: https://devpanl.dev
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      ENABLE_MONITORING: "true"
      ENABLE_BULLMQ: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SHELLY_TELEGRAM_WEBHOOK: ${SHELLY_TELEGRAM_WEBHOOK}
      PENPOT_URL: ${PENPOT_URL}
      AFFINE_URL: ${AFFINE_URL}
    volumes:
      - ./storage:/app/storage
      - ./dist:/app/dist
    networks:
      - devpanel_net
    depends_on:
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devpanel.rule=Host(`devpanl.dev`)"
      - "traefik.http.routers.devpanel.entrypoints=websecure"
      - "traefik.http.routers.devpanel.tls=true"
      - "traefik.http.routers.devpanel.tls.certresolver=letsencrypt"
      - "traefik.http.services.devpanel.loadbalancer.server.port=3030"

  # ============================================================================
  # POSTGRESQL — AFFiNE database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: devpanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: affine
      POSTGRES_PASSWORD: ${AFFINE_DB_PASSWORD}
      POSTGRES_DB: affine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - devpanel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affine"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ============================================================================
  # AFFINE — Migration job (runs once before server starts)
  # ============================================================================
  affine-migration:
    image: ghcr.io/toeverything/affine:stable
    container_name: devpanel-affine-migration
    volumes:
      - affine-config:/root/.affine/config
      - affine-storage:/root/.affine/storage
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    environment:
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgresql://affine:${AFFINE_DB_PASSWORD}@postgres:5432/affine
      AFFINE_INDEXER_ENABLED: "false"
    networks:
      - devpanel_net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ============================================================================
  # AFFINE — Documentation & knowledge base
  # ============================================================================
  affine:
    image: ghcr.io/toeverything/affine:stable
    container_name: devpanel-affine
    restart: unless-stopped
    environment:
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgresql://affine:${AFFINE_DB_PASSWORD}@postgres:5432/affine
      AFFINE_INDEXER_ENABLED: "false"
      AFFINE_SERVER_EXTERNAL_URL: "https://devpanl.dev/affine"
    volumes:
      - affine-config:/root/.affine/config
      - affine-storage:/root/.affine/storage
    networks:
      - devpanel_net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      affine-migration:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.affine.rule=Host(`devpanl.dev`) && PathPrefix(`/affine`)"
      - "traefik.http.routers.affine.entrypoints=websecure"
      - "traefik.http.routers.affine.tls=true"
      - "traefik.http.routers.affine.tls.certresolver=letsencrypt"
      - "traefik.http.routers.affine.middlewares=affine-auth,affine-strip"
      - "traefik.http.services.affine.loadbalancer.server.port=3010"
      # Basic auth
      - "traefik.http.middlewares.affine-auth.basicauth.usersfile=/etc/traefik/.htpasswd"
      # Strip /affine prefix before forwarding to AFFiNE
      - "traefik.http.middlewares.affine-strip.stripprefix.prefixes=/affine"

volumes:
  traefik-certs:
  redis-data:
  postgres-data:
  affine-config:
  affine-storage:

networks:
  devpanel_net:
    external: true
