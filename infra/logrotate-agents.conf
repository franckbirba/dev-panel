# Logrotate config for the agents host (hetzner-vps).
# Install at /etc/logrotate.d/devpanel-agents.
#
# Why this exists: 2026-05-08, telegram-multi.log hit 2.1 GB in a few weeks
# because a stderr EPIPE re-entered uncaughtException → log() → stderr →
# EPIPE in a tight loop, writing the same line 80+ times/sec. The stderr
# write is now wrapped, but a stuck logger will burn disk fast otherwise.
#
# We rotate aggressively: weekly, keep 4, max 100M before forced rotation,
# truncate-in-place (copytruncate) because telegram-multi holds an open fd
# via openSync — a regular rotate would orphan the fd to the renamed file.

/home/deploy/logs/telegram-multi.log {
    weekly
    rotate 4
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    maxsize 100M
    su deploy deploy
}

/home/deploy/logs/shelly.log /home/deploy/logs/shelly-restarts.log {
    weekly
    rotate 2
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    maxsize 50M
    su deploy deploy
}
